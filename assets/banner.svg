<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" rx="15" />
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#FFFFFF" filter="url(#glow)">
    Awesome Digital Analytics
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#E2E8F0">
    Curated list of SaaS and Open-Source Analytics Platforms
  </text>
  <circle cx="100" cy="100" r="10" fill="#FFF" opacity="0.5">
    <animate attributeName="cy" values="100;80;100" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="120" r="15" fill="#FFF" opacity="0.3">
    <animate attributeName="cy" values="120;150;120" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="50" r="6" fill="#FFF" opacity="0.6">
    <animate attributeName="cy" values="50;30;50" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
